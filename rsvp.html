<!DOCTYPE html>
<html>

<head>

    <title>RSVP</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


    <div class="container">


        <div class="invitation-card">


            <h1>
                🙏 RSVP
            </h1>


            <form id="rsvpForm">


                <input id="name" placeholder="Your Name" required>


                <input id="phone" placeholder="Phone Number">


                <select id="attending">

                    <option value="true">
                        ✅ Yes, I will attend
                    </option>

                    <option value="false">
                        ❌ Sorry, cannot attend
                    </option>

                </select>



                <input id="adults" type="number" placeholder="Number of Adults" value="1">



                <input id="children" type="number" placeholder="Number of Children" value="0">



                <input id="family_members" placeholder="Family Members Names (Optional)">



                <textarea id="message" placeholder="Your Message / Blessings (Optional)" rows="4"></textarea>



                <br>


                <button class="rsvp-btn">

                    Confirm RSVP

                </button>


            </form>



            <p id="message"></p>


        </div>


    </div>



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>


    <script src="assets/js/rsvp.js"></script>


</body>

</html>
