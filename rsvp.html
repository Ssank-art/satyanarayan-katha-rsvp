<!DOCTYPE html>
<html>

<head>

    <title>RSVP</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


    <div class="container">


        <div class="invitation-card">


            <h1>
                🙏 RSVP
            </h1>


            <form id="rsvpForm">


                <input id="name" placeholder="Your Name" required>


                <input id="phone" placeholder="Phone Number">


                <input id="guests" type="number" placeholder="Number of Guests" required>



                <select id="attending">

                    <option value="true">
                        Yes, I will attend
                    </option>

                    <option value="false">
                        Sorry, cannot attend
                    </option>

                </select>


                <br><br>


                <button class="rsvp-btn">

                    Confirm RSVP

                </button>


            </form>



            <p id="message"></p>


        </div>


    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>


    <script src="assets/js/rsvp.js"></script>


</body>

</html>
