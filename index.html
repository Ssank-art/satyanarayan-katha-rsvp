<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satyanarayan Katha Invitation</title>
    <meta name="description" content="Join us for Satyanarayan Katha and confirm your RSVP." ." />
<link href="assets/css/style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
        />
</head>

<body>
    <main class="page invitation-page">
        <section class="invitation-shell">
            <article class="invitation-card sacred-card">

                <div class="invite-poster-wrap">

                <section class="quick-details" aria-label="Event details">

                    </div>

                    <div class="quick-detail">
                        <span>⏰</span>
                        <div>

                        </div>
                    </div>

                    <div class="quick-detail">
                        <span>📍</span>
                        <div>
                            <strong>Venue</strong>
                            <p><a href="https://maps.app.goo.gl/oYuo8Q81ijViwTQNA" target="_blank" rel="noopener noreferrer">82 Trowbridge St., Breslau, ON NOB 1M0</a></p>
                        </div>
                    </div>
                </section>

                    <a href="rsvp.html" class="rsvp-btn">🙏 RSVP Now</a>
                </div>

        </section>
