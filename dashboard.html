<!DOCTYPE html>
<html>

<head>

    <title>RSVP Dashboard</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


    <div class="container">


        <div class="invitation-card">


            <h1>
                🙏 RSVP Dashboard
            </h1>


            <div id="summary">

                Loading...

            </div>



            <input id="search" placeholder="Search guest name..." onkeyup="filterGuests()">



            <table id="guestTable">


                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Phone</th>

                        <th>Adults</th>

                        <th>Children</th>

                        <th>Status</th>

                        <th>Message</th>

                    </tr>

                </thead>


                <tbody>

                </tbody>


            </table>


            <br>


            <button class="rsvp-btn" onclick="exportCSV()">

                ⬇ Export CSV

            </button>


            <br><br>


            <button class="rsvp-btn" onclick="logout()">

                Logout

            </button>



        </div>


    </div>



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>


    <script src="assets/js/dashboard.js"></script>


</body>

</html>
